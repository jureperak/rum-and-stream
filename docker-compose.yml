services:
  tortuga:
    image: lscr.io/linuxserver/jellyfin
    container_name: tortuga
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_ROOT}/config/jellyfin:/config
      - ${MEDIA_ROOT}/media/movies:/media/movies
      - ${MEDIA_ROOT}/media/shows:/media/shows
    networks: [edge]
    restart: unless-stopped

  blackpearl:
    image: lscr.io/linuxserver/qbittorrent
    container_name: blackpearl
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${MEDIA_ROOT}/config/qbittorrent:/config
      - ${MEDIA_ROOT}/downloads:/downloads
    networks: [edge]
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_ROOT}/config/sonarr:/config
      - ${MEDIA_ROOT}/media:/media
      - ${MEDIA_ROOT}/downloads:/downloads
    networks:
      - edge
    restart: unless-stopped

networks:
  edge:
    external: true
    name: ${DOCKER_NETWORK}
